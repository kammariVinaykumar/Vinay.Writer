                likes: 45,
                views: 230,
                isLiked: false,
                hidden: false,
                image: ""
            }
        ];

        let stories = JSON.parse(localStorage.getItem('vinay_cloud_v1'));
        if (!stories || stories.length === 0) {
            stories = defaultStories;
            localStorage.setItem('vinay_cloud_v1', JSON.stringify(stories));
        }

        // --- MOBILE TRIPLE TAP TO LOGIN AS ADMIN ---
        let clickCount = 0;
        function handleSecretTap(e) {
            clickCount++;
            if (clickCount === 3) {
                clickCount = 0;
                triggerAdminLogin();
            }
            setTimeout(() => { clickCount = 0; }, 1000);
        }

        function triggerAdminLogin() {
            const inputPass = prompt("Enter Admin Key:");
            if (inputPass === "vinay123") { 
                isAdmin = true;
                document.body.classList.add('admin-mode');
                document.getElementById('view-toggle').classList.remove('hidden');
                renderStories(currentFilter);
            }
        }

        function toggleAdmin() {
            isAdmin = false;
            document.body.classList.remove('admin-mode');
            document.getElementById('view-toggle').classList.add('hidden');
            renderStories(currentFilter);
        }

        function renderStories(filter = 'Short Film Stories') {
            currentFilter = filter; 
            const userGrid = document.getElementById('story-grid');
            const adminContainer = document.getElementById('admin-lists-container');
            
            const createCard = (s, idx) => `
                <div class="bg-zinc-900 border border-zinc-800 rounded-[2rem] overflow-hidden relative flex flex-col h-full ${s.hidden ? 'opacity-40' : ''}">
                    <div class="p-6 flex-grow flex flex-col justify-between pt-12">
                        <div>
                            ${isAdmin ? `
                            <div class="absolute top-4 right-4 flex gap-1 z-10">
                                <button onclick="editStory(${idx}); event.stopPropagation();" class="bg-blue-600 p-1 px-2 rounded-full text-[8px] uppercase font-bold">Edit</button>
                                <button onclick="deleteStory(${idx}); event.stopPropagation();" class="bg-red-600 p-1 px-2 rounded-full text-[8px] uppercase font-bold">Del</button>
                            </div>` : ''}
                            <span class="text-red-500 text-[10px] font-black uppercase tracking-widest mb-1 block">${filter}</span>
                            <h3 class="text-xl font-black mb-4 uppercase italic leading-tight text-white">${s.title}</h3>
                        </div>
                        <button onclick="showDetails(${idx})" class="w-full border border-zinc-700 py-2.5 rounded-xl font-black uppercase hover:bg-red-600 transition text-[11px] text-white">Read Script</button>
                    </div>
                </div>`;

            if(isAdmin) {
                const cats = ['Short Film Stories', 'Movie Scenes', 'Serial Content'];
                adminContainer.innerHTML = cats.map(cat => `
                    <div class="mb-6">
                        <h3 class="text-2xl font-black mb-4 border-b-2 border-red-600 pb-1 uppercase italic text-white">${cat}</h3>
                        <div class="grid md:grid-cols-3 gap-6">${stories.filter(s => s.category === cat).map(s => createCard(s, stories.indexOf(s))).join('')}</div>
                    </div>`).join('');
            } else {
                userGrid.innerHTML = stories.filter(s => !s.hidden && s.category === filter).map(s => createCard(s, stories.indexOf(s))).join('') || `<p class="col-span-full text-center text-zinc-500 py-6 italic text-sm">No scripts available.</p>`;
            }
        }

        window.editStory = function(index) {
            const s = stories[index];
            document.getElementById('edit-index').value = index;
            document.getElementById('title').value = s.title;
            document.getElementById('category').value = s.category;
            document.getElementById('fullStory').value = s.story;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.deleteStory = function(index) {
            if (confirm("Delete this script?")) {
                stories.splice(index, 1);
                localStorage.setItem('vinay_cloud_v1', JSON.stringify(stories));
                renderStories(currentFilter);
            }
        };

        document.getElementById('story-form').onsubmit = function(e) { 
            e.preventDefault(); 
            const idx = parseInt(document.getElementById('edit-index').value); 
            const newData = { 
                title: document.getElementById('title').value, 
                image: "", 
                category: document.getElementById('category').value, 
                story: document.getElementById('fullStory').value, 
                likes: idx !== -1 ? stories[idx].likes : 0, 
                views: idx !== -1 ? stories[idx].views : 0, 
                isLiked: idx !== -1 ? stories[idx].isLiked : false, 
                hidden: idx !== -1 ? stories[idx].hidden : false 
            }; 
            if(idx === -1) stories.push(newData);
            else stories[idx] = newData;
            localStorage.setItem('vinay_cloud_v1', JSON.stringify(stories)); 
            document.getElementById('story-form').reset(); 
            document.getElementById('edit-index').value = "-1"; 
            renderStories(currentFilter); 
        };

        function showDetails(index) { 
            currentStoryIndex = index; 
            const s = stories[index]; 
            if(!s.views) s.views = 0; s.views++;
            localStorage.setItem('vinay_cloud_v1', JSON.stringify(stories));

            document.getElementById('home-page').classList.remove('active'); 
            document.getElementById('details-page').classList.add('active'); 
            
            document.getElementById('details-content').innerHTML = `
                <h1 class="text-3xl md:text-5xl font-black mb-6 uppercase italic underline decoration-red-600 text-white">${s.title}</h1>
                <div class="leading-relaxed text-base md:text-xl font-normal space-y-2 font-mono">${s.story}</div>`; 
            
            document.getElementById('like-count').innerText = s.likes || 0; 
            document.getElementById('view-count').innerText = s.views; 
            loadComments(s.title); 
            window.scrollTo(0,0); 
        }

        function showHome() { document.getElementById('details-page').classList.remove('active'); document.getElementById('home-page').classList.add('active'); renderStories(currentFilter); }
        function loadComments(title) { document.getElementById('comment-list').innerHTML = `<p class="text-zinc-600 uppercase text-[9px]">No feedback yet.</p>`; }
        
        window.addEventListener('blur', () => document.getElementById('security-overlay').style.display = 'flex');
        window.addEventListener('focus', () => document.getElementById('security-overlay').style.display = 'none');

        window.addEventListener('DOMContentLoaded', (event) => {
            renderStories('Short Film Stories');
        });
    </script>
